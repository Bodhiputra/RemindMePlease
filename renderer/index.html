<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RemindMePlease</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- COLLAPSED BAR -->
  <div id="notch-bar" class="notch-bar">
    <span id="bar-count" class="bar-stat">0 tasks</span>
    <span id="bar-urgent" class="bar-stat urgent hidden">0 due</span>
    <span id="bar-progress" class="bar-stat muted">0%</span>
    <button id="btn-toggle" class="bar-btn toggle-btn" title="Open (Cmd+Shift+Space)">▾</button>
  </div>

  <!-- HIDDEN HINT — visible only when notch is hidden -->
  <div id="hidden-hint" class="hidden-hint">
    <span class="hint-text">Cmd + Shift + Space</span>
  </div>

  <!-- EXPANDED PANEL -->
  <div id="panel" class="panel hidden">
    <div class="view-tabs">
      <button class="tab active" data-view="master">Master</button>
      <button class="tab" data-view="today">Today</button>
      <button class="tab" data-view="calendar">Calendar</button>
      <button class="tab" data-view="category">Category</button>
    </div>
    <div class="search-row">
      <input id="search-input" type="text" placeholder="Search tasks..." class="search-input" />
      <select id="filter-category" class="filter-select">
        <option value="">All</option>
      </select>
    </div>
    <div id="task-area" class="task-area"></div>
    <div class="panel-footer">
      <button id="btn-add" class="footer-btn primary">+ Task</button>
      <button id="btn-quick-note" class="footer-btn small">Note</button>
      <div class="spacer"></div>
      <button id="btn-settings" class="footer-btn small">Settings</button>
    </div>
  </div>

  <!-- TASK FORM POPUP -->
  <div id="task-form-overlay" class="popup-overlay hidden">
    <div class="popup-backdrop"></div>
    <div class="popup-card popup-scrollable">
      <div class="popup-header">
        <span id="form-title">New Task</span>
        <button id="btn-form-close" class="icon-btn">✕</button>
      </div>
      <div class="task-form">
        <input id="form-name" type="text" class="form-input" placeholder="Task title *" />
        <div class="form-row">
          <select id="form-status" class="form-select">
            <option value="todo">Todo</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <select id="form-priority" class="form-select">
            <option value="urgent">Urgent</option>
            <option value="high">High</option>
            <option value="normal">Normal</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-row">
          <select id="form-category" class="form-select"></select>
          <input id="form-deadline" type="date" class="form-input" />
        </div>
        <textarea id="form-notes" class="form-textarea" placeholder="Notes (optional)"></textarea>
        <div class="subtasks-section">
          <div class="subtasks-header">
            <span>Subtasks</span>
            <button id="btn-add-subtask" class="icon-btn small">+ Add</button>
          </div>
          <div id="subtask-list" class="subtask-list"></div>
        </div>
        <div class="reminder-section">
          <select id="form-reminder-type" class="form-select">
            <option value="never">No reminder</option>
            <option value="always">Remind daily (9am)</option>
            <option value="before-deadline">Remind before deadline</option>
          </select>
          <div id="reminder-days-row" class="hidden form-row">
            <label class="form-label">Days before:</label>
            <input id="form-reminder-days" type="number" min="1" max="30" value="1" class="form-input small" />
          </div>
        </div>
        <div class="recurring-section">
          <label class="toggle-label">
            <input id="form-recurring" type="checkbox" />
            <span>Recurring task</span>
          </label>
          <div id="recurring-options" class="hidden form-row">
            <select id="form-recurring-interval" class="form-select">
              <option value="daily">Daily</option>
              <option value="weekly">Weekly</option>
              <option value="monthly">Monthly</option>
            </select>
            <div id="recurring-day-row" class="hidden">
              <select id="form-recurring-day" class="form-select">
                <option value="monday">Monday</option>
                <option value="tuesday">Tuesday</option>
                <option value="wednesday">Wednesday</option>
                <option value="thursday">Thursday</option>
                <option value="friday">Friday</option>
                <option value="saturday">Saturday</option>
                <option value="sunday">Sunday</option>
              </select>
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button id="btn-form-delete" class="form-btn danger hidden">Delete</button>
          <button id="btn-form-cancel" class="form-btn">Cancel</button>
          <button id="btn-form-save" class="form-btn primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SETTINGS POPUP -->
  <div id="settings-overlay" class="popup-overlay hidden">
    <div class="popup-backdrop"></div>
    <div class="popup-card">
      <div class="popup-header">
        <span>Settings</span>
        <button id="btn-close-settings" class="icon-btn">✕</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-label">Keyboard shortcut</div>
          <div class="settings-value">Cmd + Shift + Space</div>
        </div>
        <div class="settings-section">
          <div class="settings-label">Display</div>
          <label class="toggle-label">
            <input id="toggle-icons" type="checkbox" />
            <span>Show icons alongside text</span>
          </label>
        </div>
        <div class="settings-section">
          <div class="settings-label">Categories</div>
          <div id="category-list" class="category-list"></div>
          <div class="settings-row">
            <input id="new-category-input" type="text" class="form-input" placeholder="New category..." />
            <button id="btn-add-category" class="footer-btn small">Add</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">Export data</div>
          <div class="settings-row">
            <button id="btn-export-json" class="footer-btn small">Export JSON</button>
            <button id="btn-export-csv" class="footer-btn small">Export CSV</button>
            <button id="btn-open-folder" class="footer-btn small">Open folder</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">Notch visibility</div>
          <button id="btn-hide-from-settings" class="footer-btn small">Hide notch</button>
          <div class="settings-hint">When hidden, hover top-center or press Cmd+Shift+Space to restore</div>
        </div>
      </div>
    </div>
  </div>

  <!-- QUICK NOTE POPUP -->
  <div id="quick-note-overlay" class="popup-overlay hidden">
    <div class="popup-backdrop"></div>
    <div class="popup-card">
      <div class="popup-header">
        <span id="quick-note-label">Quick Note</span>
        <button id="btn-close-note" class="icon-btn">✕</button>
      </div>
      <textarea id="quick-note-text" class="quick-note-text" placeholder="Jot anything down..."></textarea>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
